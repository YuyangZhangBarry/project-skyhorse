# Pings the production API so free hosts (e.g. Render) are less likely to spin down
# between user sessions. Set repository secret API_HEALTH_URL to the full health URL, e.g.
# https://your-service.onrender.com/api/health
name: API keep-warm
on:
  schedule:
    - cron: "*/12 * * * *" # every 12 minutes (GitHub may delay a few minutes)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: GET /api/health
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: |
          if [ -z "$API_HEALTH_URL" ]; then
            echo "Skip: API_HEALTH_URL secret is not set in this repository."
            exit 0
          fi
          curl -fsS --max-time 60 --retry 2 --retry-delay 2 "$API_HEALTH_URL"
